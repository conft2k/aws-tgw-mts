AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Hybrid Multicast HA Base Infrastructure -
  VPC, Multicast-enabled Transit Gateway, TGW Multicast Domain (IGMPv2),
  and Amazon VPC Route Server (BGP + BFD) with per-AZ Endpoints.

# ──────────────────────────────────────────────
# Metadata (console parameter grouping)
# ──────────────────────────────────────────────
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: '1. General' }
        Parameters: [ProjectName]
      - Label: { default: '2. AWS side - VPC & Subnets' }
        Parameters:
          - VpcCidr
          - AvailabilityZone1
          - RouterSubnet1Cidr
          - ReceiverSubnet1Cidr
          - AvailabilityZone2
          - RouterSubnet2Cidr
          - ReceiverSubnet2Cidr
      - Label: { default: '3. AWS side - Transit Gateway' }
        Parameters: [TgwAsn]
      - Label: { default: '4. AWS side - Route Server' }
        Parameters:
          - RouteServerAsn
          - PersistRoutesDuration
          - EnableSnsNotifications
      - Label: { default: '5. Customer side - C8000V BGP & On-prem GRE' }
        Parameters:
          - RouterBgpAsn
          - Router1PeerAddress
          - Router1Gi2Address
          - Router2PeerAddress
          - Router2Gi2Address
          - OnPremCidr
          - OnPremGreSourceCidr
      - Label: { default: '6. Multicast Receiver EC2' }
        Parameters:
          - Receiver1Address
          - Receiver2Address
          - ReceiverInstanceType
          - LatestAmiId
      - Label: { default: '7. Deployment phase' }
        Parameters: [CreateRouteServerPeers]
    ParameterLabels:
      VpcCidr: { default: 'Prod VPC CIDR' }
      TgwAsn: { default: 'TGW Amazon-side ASN' }
      RouteServerAsn: { default: 'Route Server Amazon-side ASN' }
      RouterBgpAsn: { default: 'C8000V BGP ASN (CGW ASN)' }
      Router1PeerAddress: { default: 'C8000V-1 Gi1 IP (RS Peer-1)' }
      Router1Gi2Address: { default: 'C8000V-1 Gi2 IP (multicast)' }
      Router2PeerAddress: { default: 'C8000V-2 Gi1 IP (RS Peer-2)' }
      Router2Gi2Address: { default: 'C8000V-2 Gi2 IP (multicast)' }
      OnPremCidr: { default: 'On-prem network CIDR (router SG inbound)' }
      OnPremGreSourceCidr: { default: 'On-prem GRE source CIDR (OnPrem Router Lo0)' }
      Receiver1Address: { default: 'Receiver-1 IP (AZ1)' }
      Receiver2Address: { default: 'Receiver-2 IP (AZ2)' }
      ReceiverInstanceType: { default: 'Receiver instance type' }
      LatestAmiId: { default: 'Latest AL2023 AMI (SSM parameter)' }
      CreateRouteServerPeers: { default: 'Create RS Peers now? (2nd stage)' }

# ──────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: mcast
    Description: Name prefix for all resources

  VpcCidr:
    Type: String
    Default: 10.1.1.0/24
    Description: Prod VPC CIDR

  RouterSubnet1Cidr:
    Type: String
    Default: 10.1.1.0/27
    Description: AZ1 Router subnet (C8000V-1 Gi1 + RS Endpoint-1)

  ReceiverSubnet1Cidr:
    Type: String
    Default: 10.1.1.32/27
    Description: AZ1 Receiver subnet (C8000V-1 Gi2 + Receivers, multicast domain)

  RouterSubnet2Cidr:
    Type: String
    Default: 10.1.1.64/27
    Description: AZ2 Router subnet (C8000V-2 Gi1 + RS Endpoint-2)

  ReceiverSubnet2Cidr:
    Type: String
    Default: 10.1.1.96/27
    Description: AZ2 Receiver subnet (C8000V-2 Gi2 + Receivers, multicast domain)

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2a

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2c

  TgwAsn:
    Type: Number
    Default: 65400
    Description: Amazon side ASN for Transit Gateway

  RouteServerAsn:
    Type: Number
    Default: 65100
    Description: Amazon side ASN for VPC Route Server

  RouterBgpAsn:
    Type: Number
    Default: 65200
    Description: BGP ASN of the C8000V routers (Route Server peers)

  OnPremCidr:
    Type: String
    Default: 192.168.0.0/16
    Description: On-prem network range - allowed inbound on the C8000V router SG

  OnPremGreSourceCidr:
    Type: String
    Default: 192.168.255.1/32
    Description: On-prem router Loopback0 (GRE tunnel source) - routed to TGW from Router subnets

  Router1PeerAddress:
    Type: String
    Default: 10.1.1.10
    Description: C8000V-1 Gi1 IP (Route Server Peer-1 address)

  Router1Gi2Address:
    Type: String
    Default: 10.1.1.40
    Description: C8000V-1 Gi2 fixed IP (ReceiverSubnet1, multicast interface)

  Router2PeerAddress:
    Type: String
    Default: 10.1.1.90
    Description: C8000V-2 Gi1 IP (Route Server Peer-2 address)

  Router2Gi2Address:
    Type: String
    Default: 10.1.1.110
    Description: C8000V-2 Gi2 fixed IP (ReceiverSubnet2, multicast interface)

  Receiver1Address:
    Type: String
    Default: 10.1.1.50
    Description: Receiver-1 fixed IP (ReceiverSubnet1, AZ1)

  Receiver2Address:
    Type: String
    Default: 10.1.1.120
    Description: Receiver-2 fixed IP (ReceiverSubnet2, AZ2)

  ReceiverInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
    Description: Multicast receiver EC2 instance type

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: The latest AL2023 AMI ID

  PersistRoutesDuration:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 5
    Description: Minutes to wait after BGP re-establishment before unpersisting routes

  EnableSnsNotifications:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Persist BGP/BFD status changes to an AWS-provisioned SNS topic

  CreateRouteServerPeers:
    Type: String
    Default: 'No'
    AllowedValues: ['Yes', 'No']
    Description: >-
      Set to Yes AFTER the C8000V instances are deployed with the Gi1 IPs above.
      Creates RS Peers (BFD) and enables propagation on the Receiver route table.

# ──────────────────────────────────────────────
# Conditions
# ──────────────────────────────────────────────
Conditions:
  CreatePeers: !Equals [!Ref CreateRouteServerPeers, 'Yes']

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ───── VPC & Subnets ─────
  ProdVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-prod-vpc' }

  RouterSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref RouterSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-subnet-router-az1' }

  ReceiverSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref ReceiverSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-subnet-receiver-az1' }

  RouterSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref RouterSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-subnet-router-az2' }

  ReceiverSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref ReceiverSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-subnet-receiver-az2' }

  # ───── Route Tables ─────
  RouterRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rtb-router-underlay' }

  ReceiverRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rtb-receiver-rs-propagated' }

  RouterSubnet1RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref RouterSubnet1
      RouteTableId: !Ref RouterRouteTable

  RouterSubnet2RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref RouterSubnet2
      RouteTableId: !Ref RouterRouteTable

  ReceiverSubnet1RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ReceiverSubnet1
      RouteTableId: !Ref ReceiverRouteTable

  ReceiverSubnet2RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ReceiverSubnet2
      RouteTableId: !Ref ReceiverRouteTable

  # ───── EC2 Instance Connect Endpoint (SSH access to routers) ─────
  # A single EICE can reach instances in every AZ of the VPC.
  # Placed in AZ1; AZ2 (C8000V-2) is reached cross-AZ, which requires
  # PreserveClientIp=false.
  EicEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 Instance Connect Endpoint - SSH egress to VPC
      VpcId: !Ref ProdVpc
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref VpcCidr
          Description: SSH to routers in VPC
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-sg-eic-endpoint' }

  EicEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      SubnetId: !Ref RouterSubnet1
      SecurityGroupIds:
        - !Ref EicEndpointSecurityGroup
      PreserveClientIp: false
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eice-router-ssh' }

  # ───── C8000V Router Security Group ─────
  # Attach to the C8000V Gi1/Gi2 ENIs in the instance stack.
  # Allows all traffic from the VPC and on-prem ranges (GRE 47, BGP 179,
  # BFD 3784-3785, multicast UDP, SSH via EICE are all covered), plus
  # IGMP query from the TGW querier (proto 2, src 0.0.0.0/32).
  RouterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: C8000V router - allow VPC and on-prem ranges, IGMP query
      VpcId: !Ref ProdVpc
      SecurityGroupIngress:
        - IpProtocol: '-1'
          CidrIp: !Ref VpcCidr
          Description: All traffic from VPC (RS BGP/BFD, multicast, EICE SSH)
        - IpProtocol: '-1'
          CidrIp: !Ref OnPremCidr
          Description: All traffic from on-prem range (GRE underlay, mgmt)
        - IpProtocol: '2'
          CidrIp: 0.0.0.0/32
          Description: IGMP query from TGW
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-sg-c8000v-router' }

  # ───── C8000V Router ENIs (pre-created with fixed IPs) ─────
  # Attach these to the C8000V instances in the instance stack
  # (Gi1 = device index 0 side, Gi2 = multicast side).
  # SourceDestCheck is disabled on all router ENIs (routing function).
  Router1Gi1Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref RouterSubnet1
      PrivateIpAddress: !Ref Router1PeerAddress
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-1 Gi1 - GRE underlay + RS Peer-1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eni-c8000v1-gi1' }

  Router1Gi2Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref ReceiverSubnet1
      PrivateIpAddress: !Ref Router1Gi2Address
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-1 Gi2 - multicast interface
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eni-c8000v1-gi2' }

  Router2Gi1Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref RouterSubnet2
      PrivateIpAddress: !Ref Router2PeerAddress
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-2 Gi1 - GRE underlay + RS Peer-2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eni-c8000v2-gi1' }

  Router2Gi2Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref ReceiverSubnet2
      PrivateIpAddress: !Ref Router2Gi2Address
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-2 Gi2 - multicast interface
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eni-c8000v2-gi2' }

  # ───── Multicast Receiver EC2 (one per AZ) ─────
  # IGMP query (proto 2, src 0.0.0.0/32) must be allowed - TGW is the querier.
  # Multicast data (UDP) arrives from C8000V Gi2 - allow VPC CIDR as source.
  ReceiverSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Multicast receiver - IGMP query, multicast UDP, SSH via EICE
      VpcId: !Ref ProdVpc
      SecurityGroupIngress:
        - IpProtocol: '2'
          CidrIp: 0.0.0.0/32
          Description: IGMP query from TGW
        - IpProtocol: udp
          FromPort: 0
          ToPort: 65535
          CidrIp: !Ref VpcCidr
          Description: Multicast UDP from C8000V Gi2
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref EicEndpointSecurityGroup
          Description: SSH via EC2 Instance Connect Endpoint
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-sg-receiver' }

  ReceiverInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref ReceiverInstanceType
      SubnetId: !Ref ReceiverSubnet1
      PrivateIpAddress: !Ref Receiver1Address
      SecurityGroupIds:
        - !Ref ReceiverSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-az1' }

  ReceiverInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref ReceiverInstanceType
      SubnetId: !Ref ReceiverSubnet2
      PrivateIpAddress: !Ref Receiver2Address
      SecurityGroupIds:
        - !Ref ReceiverSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-az2' }

  # ───── Transit Gateway (Multicast enabled) ─────
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: !Ref TgwAsn
      Description: !Sub '${ProjectName} TGW with multicast support'
      MulticastSupport: enable
      DnsSupport: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw' }

  # Multicast domain associations only accept subnets that belong to the
  # attachment (one subnet per AZ) -> attach the Receiver subnets. Router
  # subnets still reach the TGW via their route table because an attachment
  # exists in the same AZ (dedicated-attachment-subnet pattern).
  TgwVpcAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref ProdVpc
      SubnetIds:
        - !Ref ReceiverSubnet1
        - !Ref ReceiverSubnet2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-attach-prod-vpc' }

  # GRE underlay: route from Router subnets to on-prem Lo0 (tunnel source)
  RouterRtToOnPremLoopback:
    Type: AWS::EC2::Route
    DependsOn: TgwVpcAttachment
    Properties:
      RouteTableId: !Ref RouterRouteTable
      DestinationCidrBlock: !Ref OnPremGreSourceCidr
      TransitGatewayId: !Ref TransitGateway

  # ───── TGW Multicast Domain (IGMPv2) ─────
  MulticastDomain:
    Type: AWS::EC2::TransitGatewayMulticastDomain
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Options:
        Igmpv2Support: enable
        StaticSourcesSupport: disable
        AutoAcceptSharedAssociations: disable
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-domain-igmpv2' }

  MulticastDomainAssocReceiver1:
    Type: AWS::EC2::TransitGatewayMulticastDomainAssociation
    Properties:
      TransitGatewayMulticastDomainId: !Ref MulticastDomain
      TransitGatewayAttachmentId: !Ref TgwVpcAttachment
      SubnetId: !Ref ReceiverSubnet1

  MulticastDomainAssocReceiver2:
    Type: AWS::EC2::TransitGatewayMulticastDomainAssociation
    Properties:
      TransitGatewayMulticastDomainId: !Ref MulticastDomain
      TransitGatewayAttachmentId: !Ref TgwVpcAttachment
      SubnetId: !Ref ReceiverSubnet2

  # ───── VPC Route Server ─────
  RouteServer:
    Type: AWS::EC2::RouteServer
    Properties:
      AmazonSideAsn: !Ref RouteServerAsn
      PersistRoutes: enable
      PersistRoutesDuration: !Ref PersistRoutesDuration
      SnsNotificationsEnabled: !Ref EnableSnsNotifications
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-route-server-bgp-bfd' }

  RouteServerVpcAssociation:
    Type: AWS::EC2::RouteServerAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      VpcId: !Ref ProdVpc

  RouteServerEndpoint1:
    Type: AWS::EC2::RouteServerEndpoint
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      SubnetId: !Ref RouterSubnet1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rs-endpoint-az1' }

  RouteServerEndpoint2:
    Type: AWS::EC2::RouteServerEndpoint
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      SubnetId: !Ref RouterSubnet2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rs-endpoint-az2' }

  # ───── Route Server Peers (BFD) - 2nd deployment stage ─────
  RouteServerPeer1:
    Type: AWS::EC2::RouteServerPeer
    Condition: CreatePeers
    Properties:
      RouteServerEndpointId: !Ref RouteServerEndpoint1
      PeerAddress: !Ref Router1PeerAddress
      BgpOptions:
        PeerAsn: !Ref RouterBgpAsn
        PeerLivenessDetection: bfd
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rs-peer-c8000v1-bfd' }

  RouteServerPeer2:
    Type: AWS::EC2::RouteServerPeer
    Condition: CreatePeers
    Properties:
      RouteServerEndpointId: !Ref RouteServerEndpoint2
      PeerAddress: !Ref Router2PeerAddress
      BgpOptions:
        PeerAsn: !Ref RouterBgpAsn
        PeerLivenessDetection: bfd
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-rs-peer-c8000v2-bfd' }

  # Enable propagation on the Receiver RT only (Router RT stays static)
  RouteServerReceiverRtPropagation:
    Type: AWS::EC2::RouteServerPropagation
    Condition: CreatePeers
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      RouteTableId: !Ref ReceiverRouteTable

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:
  VpcId:
    Value: !Ref ProdVpc
  RouterSubnet1Id:
    Value: !Ref RouterSubnet1
  ReceiverSubnet1Id:
    Value: !Ref ReceiverSubnet1
  RouterSubnet2Id:
    Value: !Ref RouterSubnet2
  ReceiverSubnet2Id:
    Value: !Ref ReceiverSubnet2
  ReceiverRouteTableId:
    Value: !Ref ReceiverRouteTable
  TransitGatewayId:
    Description: TGW to associate with DXGW (done separately via console/CLI)
    Value: !Ref TransitGateway
  MulticastDomainId:
    Value: !Ref MulticastDomain
  RouteServerId:
    Value: !Ref RouteServer
  ReceiverInstance1Id:
    Description: Multicast receiver AZ1 (10.1.1.50)
    Value: !Ref ReceiverInstance1
  ReceiverInstance2Id:
    Description: Multicast receiver AZ2 (10.1.1.120)
    Value: !Ref ReceiverInstance2
  RouterSecurityGroupId:
    Description: Attach to the C8000V Gi1/Gi2 ENIs in the instance stack
    Value: !Ref RouterSecurityGroup
  EicEndpointId:
    Description: EICE for aws ec2-instance-connect ssh --instance-id <id>
    Value: !Ref EicEndpoint
  EicEndpointSecurityGroupId:
    Description: Use as the inbound tcp/22 source for the router security group
    Value: !Ref EicEndpointSecurityGroup
  Router1Gi1EniId:
    Description: Attach as C8000V-1 Gi1 (10.1.1.10, src/dest check disabled)
    Value: !Ref Router1Gi1Eni
  Router1Gi2EniId:
    Description: Attach as C8000V-1 Gi2 (10.1.1.40, src/dest check disabled)
    Value: !Ref Router1Gi2Eni
  Router2Gi1EniId:
    Description: Attach as C8000V-2 Gi1 (10.1.1.90, src/dest check disabled)
    Value: !Ref Router2Gi1Eni
  Router2Gi2EniId:
    Description: Attach as C8000V-2 Gi2 (10.1.1.110, src/dest check disabled)
    Value: !Ref Router2Gi2Eni
  RouteServerEndpoint1EniAddress:
    Description: Substitute for <RSE-1-IP> in section 9.1
    Value: !GetAtt RouteServerEndpoint1.EniAddress
  RouteServerEndpoint2EniAddress:
    Description: Substitute for <RSE-2-IP> in section 9.2
    Value: !GetAtt RouteServerEndpoint2.EniAddress