AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Hybrid Multicast HA Base Infrastructure -
  VPC, Multicast-enabled Transit Gateway, TGW Multicast Domain (IGMPv2),
  and Amazon VPC Route Server (BGP + BFD) with per-AZ Endpoints.

# ──────────────────────────────────────────────
# Metadata (console parameter grouping)
# ──────────────────────────────────────────────
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: '1. General' }
        Parameters: [ProjectName]
      - Label: { default: '2. AWS side - VPC & Subnets' }
        Parameters:
          - VpcCidr
          - AvailabilityZone1
          - RouterSubnet1Cidr
          - ReceiverSubnet1Cidr
          - TgwSubnet1Cidr
          - AvailabilityZone2
          - RouterSubnet2Cidr
          - ReceiverSubnet2Cidr
          - TgwSubnet2Cidr
      - Label: { default: '3. AWS side - Transit Gateway' }
        Parameters: [TgwAsn]
      - Label: { default: '4. AWS side - Route Server' }
        Parameters:
          - RouteServerAsn
          - PersistRoutesDuration
          - EnableSnsNotifications
      - Label: { default: '5. Customer side - C8000V BGP & On-prem GRE' }
        Parameters:
          - RouterBgpAsn
          - Router1PeerAddress
          - Router1Gi2Address
          - Router2PeerAddress
          - Router2Gi2Address
          - OnPremCidr
          - OnPremGreSourceCidr
          - AnycastLoopbackCidr
      - Label: { default: '6. Multicast Receiver EC2' }
        Parameters:
          - ReceiverInstanceType
          - LatestAmiId
    ParameterLabels:
      VpcCidr: { default: 'Prod VPC CIDR' }
      TgwAsn: { default: 'TGW Amazon-side ASN' }
      RouteServerAsn: { default: 'Route Server Amazon-side ASN' }
      RouterBgpAsn: { default: 'C8000V BGP ASN (CGW ASN)' }
      Router1PeerAddress: { default: 'C8000V-1 Gi1 IP (RS Peer-1)' }
      Router1Gi2Address: { default: 'C8000V-1 Gi2 IP (multicast)' }
      Router2PeerAddress: { default: 'C8000V-2 Gi1 IP (RS Peer-2)' }
      Router2Gi2Address: { default: 'C8000V-2 Gi2 IP (multicast)' }
      OnPremCidr: { default: 'On-prem network CIDR (router SG inbound)' }
      OnPremGreSourceCidr: { default: 'On-prem GRE source CIDR (OnPrem Router Lo0)' }
      ReceiverInstanceType: { default: 'Receiver instance type' }
      LatestAmiId: { default: 'AL2023 AMI ID (pinned)' }

# ──────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: mcast
    Description: Name prefix for all resources

  VpcCidr:
    Type: String
    Default: 10.1.1.0/24
    Description: Prod VPC CIDR

  RouterSubnet1Cidr:
    Type: String
    Default: 10.1.1.0/27
    Description: AZ1 Router subnet (C8000V-1 Gi1 + RS Endpoint-1)

  ReceiverSubnet1Cidr:
    Type: String
    Default: 10.1.1.64/27
    Description: AZ1 Receiver subnet (C8000V-1 Gi2 + Receiver-1, multicast domain)

  TgwSubnet1Cidr:
    Type: String
    Default: 10.1.1.224/28
    Description: AZ1 dedicated TGW attachment subnet (last /28s of the VPC CIDR)

  RouterSubnet2Cidr:
    Type: String
    Default: 10.1.1.32/27
    Description: AZ2 Router subnet (C8000V-2 Gi1 + RS Endpoint-2)

  ReceiverSubnet2Cidr:
    Type: String
    Default: 10.1.1.96/27
    Description: AZ2 Receiver subnet (C8000V-2 Gi2 + Receiver-2, multicast domain)

  TgwSubnet2Cidr:
    Type: String
    Default: 10.1.1.240/28
    Description: AZ2 dedicated TGW attachment subnet (last /28s of the VPC CIDR)

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2a

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-2c

  TgwAsn:
    Type: Number
    Default: 65400
    Description: Amazon side ASN for Transit Gateway

  RouteServerAsn:
    Type: Number
    Default: 65100
    Description: Amazon side ASN for VPC Route Server

  RouterBgpAsn:
    Type: Number
    Default: 65200
    Description: BGP ASN of the C8000V routers (Route Server peers)

  OnPremCidr:
    Type: String
    Default: 172.20.0.0/16
    Description: >-
      On-prem network range (LAN + router Lo0) - allowed inbound on the
      C8000V router SG and as the receiver multicast UDP source

  OnPremGreSourceCidr:
    Type: String
    Default: 172.20.255.1/32
    Description: On-prem router Loopback0 (GRE tunnel source) - routed to TGW from Router subnets

  AnycastLoopbackCidr:
    Type: String
    Default: 10.255.255.1/32
    Description: >-
      Shared C8000V Loopback0 /32 (anycast GRE tunnel anchor). Both routers
      advertise it to the Route Server (C8000V-2 with AS-path prepend); RS
      injects the winner into the TGW subnet route table. Requires, outside
      this stack: a TGW static route for this /32 to the VPC attachment and
      a DXGW allowed prefix so on-prem learns it over DX.

  Router1PeerAddress:
    Type: String
    Default: 10.1.1.30
    Description: C8000V-1 Gi1 IP (Route Server Peer-1 address)

  Router1Gi2Address:
    Type: String
    Default: 10.1.1.90
    Description: C8000V-1 Gi2 fixed IP (ReceiverSubnet1, multicast interface)

  Router2PeerAddress:
    Type: String
    Default: 10.1.1.40
    Description: C8000V-2 Gi1 IP (Route Server Peer-2 address)

  Router2Gi2Address:
    Type: String
    Default: 10.1.1.100
    Description: C8000V-2 Gi2 fixed IP (ReceiverSubnet2, multicast interface)

  ReceiverInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
    Description: Multicast receiver EC2 instance type

  LatestAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0b16c9b40a3a70d6d
    Description: >-
      AL2023 AMI ID (pinned - SSM :latest re-resolves on every stack update
      and forces receiver replacement, which collides with their fixed IPs)

  PersistRoutesDuration:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 5
    Description: Minutes to wait after BGP re-establishment before unpersisting routes

  EnableSnsNotifications:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Persist BGP/BFD status changes to an AWS-provisioned SNS topic

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ───── VPC & Subnets ─────
  ProdVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-vpc' }

  RouterSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref RouterSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-router-sub-az1' }

  ReceiverSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref ReceiverSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-sub-az1' }

  RouterSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref RouterSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-router-sub-az2' }

  ReceiverSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref ReceiverSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-sub-az2' }

  # Dedicated TGW attachment subnets (one per AZ; attachment ENIs plus the
  # EICE defined below - see the EicEndpoint comment)
  TgwSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref TgwSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-sub-az1' }

  TgwSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVpc
      CidrBlock: !Ref TgwSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-sub-az2' }

  # ───── Route Tables ─────
  RouterRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-router-rtb-underlay' }

  ReceiverRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-rtb-rs-propagated' }

  RouterSubnet1RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref RouterSubnet1
      RouteTableId: !Ref RouterRouteTable

  RouterSubnet2RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref RouterSubnet2
      RouteTableId: !Ref RouterRouteTable

  ReceiverSubnet1RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ReceiverSubnet1
      RouteTableId: !Ref ReceiverRouteTable

  ReceiverSubnet2RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ReceiverSubnet2
      RouteTableId: !Ref ReceiverRouteTable

  # TGW attachment subnets: local VPC routes only (implicit local route)
  TgwRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVpc
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-rtb' }

  TgwSubnet1RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref TgwSubnet1
      RouteTableId: !Ref TgwRouteTable

  TgwSubnet2RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref TgwSubnet2
      RouteTableId: !Ref TgwRouteTable

  # S3 gateway endpoint: lets the receivers reach the AL2023 dnf repos
  # (hosted on S3) without internet access - e.g. to install iperf
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref ProdVpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref ReceiverRouteTable
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-s3-ep' }

  # ───── EC2 Instance Connect Endpoint (SSH access to routers) ─────
  # A single EICE can reach instances in every AZ of the VPC.
  # Placed in the AZ1 TGW attachment subnet (infra-only subnet; note that
  # large-scale standards would use a dedicated mgmt subnet so the TGW
  # subnet NACL stays transit-only). Cross-AZ targets require
  # PreserveClientIp=false.
  EicEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 Instance Connect Endpoint - SSH egress to VPC
      VpcId: !Ref ProdVpc
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref VpcCidr
          Description: SSH to routers in VPC
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-eic-sg' }

  EicEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      SubnetId: !Ref TgwSubnet1
      SecurityGroupIds:
        - !Ref EicEndpointSecurityGroup
      PreserveClientIp: false
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-ssh-eic' }

  # ───── C8000V Router Security Group ─────
  # Attach to the C8000V Gi1/Gi2 ENIs in the instance stack.
  # Allows all traffic from the VPC and on-prem ranges (GRE 47, BGP 179,
  # BFD 3784-3785, multicast UDP, SSH via EICE are all covered), plus
  # IGMP query from the TGW querier (proto 2, src 0.0.0.0/32).
  RouterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: C8000V router - allow VPC and on-prem ranges, IGMP query
      VpcId: !Ref ProdVpc
      SecurityGroupIngress:
        - IpProtocol: '-1'
          CidrIp: !Ref VpcCidr
          Description: All traffic from VPC (RS BGP/BFD, multicast, EICE SSH)
        - IpProtocol: '-1'
          CidrIp: !Ref OnPremCidr
          Description: All traffic from on-prem range (GRE underlay, mgmt)
        - IpProtocol: '2'
          CidrIp: 0.0.0.0/32
          Description: IGMP query from TGW
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-c8000v-sg' }

  # ───── C8000V Router ENIs (pre-created with fixed IPs) ─────
  # Attach these to the C8000V instances in the instance stack
  # (Gi1 = device index 0 side, Gi2 = multicast side).
  # SourceDestCheck is disabled on all router ENIs (routing function).
  Router1Gi1Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref RouterSubnet1
      PrivateIpAddress: !Ref Router1PeerAddress
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-1 Gi1 - GRE underlay + RS Peer-1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-c8000v1-gi1-eni-az1' }

  Router1Gi2Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref ReceiverSubnet1
      PrivateIpAddress: !Ref Router1Gi2Address
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-1 Gi2 - multicast interface
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-c8000v1-gi2-eni-az1' }

  Router2Gi1Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref RouterSubnet2
      PrivateIpAddress: !Ref Router2PeerAddress
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-2 Gi1 - GRE underlay + RS Peer-2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-c8000v2-gi1-eni-az2' }

  Router2Gi2Eni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref ReceiverSubnet2
      PrivateIpAddress: !Ref Router2Gi2Address
      GroupSet:
        - !Ref RouterSecurityGroup
      SourceDestCheck: false
      Description: C8000V-2 Gi2 - multicast interface
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-c8000v2-gi2-eni-az2' }

  # ───── Multicast Receiver EC2 (one per AZ) ─────
  # IGMP query (proto 2, src 0.0.0.0/32) must be allowed - TGW is the querier.
  # Multicast data (UDP) arrives from C8000V Gi2 - allow VPC CIDR as source.
  ReceiverSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Multicast receiver - IGMP query, multicast UDP, SSH via EICE
      VpcId: !Ref ProdVpc
      SecurityGroupIngress:
        - IpProtocol: '2'
          CidrIp: 0.0.0.0/32
          Description: IGMP query from TGW
        - IpProtocol: udp
          FromPort: 0
          ToPort: 65535
          CidrIp: !Ref VpcCidr
          Description: Multicast UDP from VPC senders
        - IpProtocol: udp
          FromPort: 0
          ToPort: 65535
          CidrIp: !Ref OnPremCidr
          Description: Multicast UDP from on-prem sources (source IP is preserved end-to-end)
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: !Ref OnPremCidr
          Description: ICMP from on-prem (multicast ping test - echo to the group address)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref EicEndpointSecurityGroup
          Description: SSH via EC2 Instance Connect Endpoint
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-sg' }

  ReceiverInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref ReceiverInstanceType
      SubnetId: !Ref ReceiverSubnet1
      SecurityGroupIds:
        - !Ref ReceiverSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-ec2-az1' }

  ReceiverInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref ReceiverInstanceType
      SubnetId: !Ref ReceiverSubnet2
      SecurityGroupIds:
        - !Ref ReceiverSecurityGroup
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-receiver-ec2-az2' }

  # ───── Transit Gateway (Multicast enabled) ─────
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: !Ref TgwAsn
      Description: !Sub '${ProjectName} TGW with multicast support'
      MulticastSupport: enable
      DnsSupport: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw' }

  # Dedicated TGW attachment subnets (one per AZ). Multicast domain
  # associations do NOT require the subnet to belong to the attachment
  # (verified 2026-07-12 in ap-northeast-2): the domain associates the
  # Receiver subnets below while the attachment uses these dedicated
  # subnets. Other subnets reach the TGW via their route tables because
  # an attachment exists in the same AZ.
  TgwVpcAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref ProdVpc
      SubnetIds:
        - !Ref TgwSubnet1
        - !Ref TgwSubnet2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-att-vpc' }

  # GRE underlay: route from Router subnets to on-prem Lo0 (tunnel source)
  RouterRtToOnPremLoopback:
    Type: AWS::EC2::Route
    DependsOn: TgwVpcAttachment
    Properties:
      RouteTableId: !Ref RouterRouteTable
      DestinationCidrBlock: !Ref OnPremGreSourceCidr
      TransitGatewayId: !Ref TransitGateway

  # ───── TGW Multicast Domain (IGMPv2) ─────
  MulticastDomain:
    Type: AWS::EC2::TransitGatewayMulticastDomain
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Options:
        Igmpv2Support: enable
        StaticSourcesSupport: disable
        AutoAcceptSharedAssociations: disable
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-tgw-dom-igmpv2' }

  MulticastDomainAssocReceiver1:
    Type: AWS::EC2::TransitGatewayMulticastDomainAssociation
    Properties:
      TransitGatewayMulticastDomainId: !Ref MulticastDomain
      TransitGatewayAttachmentId: !Ref TgwVpcAttachment
      SubnetId: !Ref ReceiverSubnet1

  MulticastDomainAssocReceiver2:
    Type: AWS::EC2::TransitGatewayMulticastDomainAssociation
    Properties:
      TransitGatewayMulticastDomainId: !Ref MulticastDomain
      TransitGatewayAttachmentId: !Ref TgwVpcAttachment
      SubnetId: !Ref ReceiverSubnet2

  # ───── VPC Route Server ─────
  RouteServer:
    Type: AWS::EC2::RouteServer
    Properties:
      AmazonSideAsn: !Ref RouteServerAsn
      PersistRoutes: enable
      PersistRoutesDuration: !Ref PersistRoutesDuration
      SnsNotificationsEnabled: !Ref EnableSnsNotifications
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-bgp-rs-bfd' }

  RouteServerVpcAssociation:
    Type: AWS::EC2::RouteServerAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      VpcId: !Ref ProdVpc

  RouteServerEndpoint1:
    Type: AWS::EC2::RouteServerEndpoint
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      SubnetId: !Ref RouterSubnet1
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-bgp-rse-az1' }

  RouteServerEndpoint2:
    Type: AWS::EC2::RouteServerEndpoint
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      SubnetId: !Ref RouterSubnet2
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-bgp-rse-az2' }

  # ───── Route Server Peers (BFD) ─────
  # Created in the same pass as everything else: a peer only needs the ENI
  # owning PeerAddress to exist (DependsOn below); BgpStatus stays "down"
  # until the C8000V comes up and initiates the session.
  RouteServerPeer1:
    Type: AWS::EC2::RouteServerPeer
    # Peer creation requires an existing ENI owning PeerAddress (the device
    # itself may be down - BgpStatus stays "down" until it initiates BGP).
    # The Gi1 ENI is created in this stack, so make the ordering explicit.
    DependsOn: Router1Gi1Eni
    Properties:
      RouteServerEndpointId: !Ref RouteServerEndpoint1
      PeerAddress: !Ref Router1PeerAddress
      BgpOptions:
        PeerAsn: !Ref RouterBgpAsn
        PeerLivenessDetection: bfd
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-bgp-rsp-c8000v1-bfd' }

  RouteServerPeer2:
    Type: AWS::EC2::RouteServerPeer
    DependsOn: Router2Gi1Eni
    Properties:
      RouteServerEndpointId: !Ref RouteServerEndpoint2
      PeerAddress: !Ref Router2PeerAddress
      BgpOptions:
        PeerAsn: !Ref RouterBgpAsn
        PeerLivenessDetection: bfd
      Tags:
        - { Key: Name, Value: !Sub '${ProjectName}-bgp-rsp-c8000v2-bfd' }

  # Enable propagation on the Receiver RT (on-prem LAN return path) and the
  # TGW subnet RT (anycast Lo0 -> active C8000V Gi1, GRE ingress steering).
  # Router RT stays static.
  RouteServerReceiverRtPropagation:
    Type: AWS::EC2::RouteServerPropagation
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      RouteTableId: !Ref ReceiverRouteTable

  RouteServerTgwRtPropagation:
    Type: AWS::EC2::RouteServerPropagation
    DependsOn: RouteServerVpcAssociation
    Properties:
      RouteServerId: !Ref RouteServer
      RouteTableId: !Ref TgwRouteTable

# ──────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────
Outputs:
  VpcId:
    Value: !Ref ProdVpc
  RouterSubnet1Id:
    Value: !Ref RouterSubnet1
  ReceiverSubnet1Id:
    Value: !Ref ReceiverSubnet1
  RouterSubnet2Id:
    Value: !Ref RouterSubnet2
  ReceiverSubnet2Id:
    Value: !Ref ReceiverSubnet2
  AnycastLoopback:
    Description: Shared C8000V Lo0 (GRE anchor) - needs TGW static route + DXGW allowed prefix
    Value: !Ref AnycastLoopbackCidr
  TgwSubnet1Id:
    Description: Dedicated TGW attachment subnet AZ1
    Value: !Ref TgwSubnet1
  TgwSubnet2Id:
    Description: Dedicated TGW attachment subnet AZ2
    Value: !Ref TgwSubnet2
  ReceiverRouteTableId:
    Value: !Ref ReceiverRouteTable
  TransitGatewayId:
    Description: TGW to associate with DXGW (done separately via console/CLI)
    Value: !Ref TransitGateway
  MulticastDomainId:
    Value: !Ref MulticastDomain
  RouteServerId:
    Value: !Ref RouteServer
  ReceiverInstance1Id:
    Description: Multicast receiver AZ1 (IP auto-assigned)
    Value: !Ref ReceiverInstance1
  ReceiverInstance2Id:
    Description: Multicast receiver AZ2 (IP auto-assigned)
    Value: !Ref ReceiverInstance2
  RouterSecurityGroupId:
    Description: Attach to the C8000V Gi1/Gi2 ENIs in the instance stack
    Value: !Ref RouterSecurityGroup
  EicEndpointId:
    Description: EICE for aws ec2-instance-connect ssh --instance-id <id>
    Value: !Ref EicEndpoint
  EicEndpointSecurityGroupId:
    Description: Use as the inbound tcp/22 source for the router security group
    Value: !Ref EicEndpointSecurityGroup
  Router1Gi1EniId:
    Description: Attach as C8000V-1 Gi1 (10.1.1.30, src/dest check disabled)
    Value: !Ref Router1Gi1Eni
  Router1Gi2EniId:
    Description: Attach as C8000V-1 Gi2 (10.1.1.90, src/dest check disabled)
    Value: !Ref Router1Gi2Eni
  Router2Gi1EniId:
